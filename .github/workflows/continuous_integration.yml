# Continuous Integration: build + unit + integration test matrix across Linux/macOS/Windows toolchains.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # Use a writable, cache-friendly binary cache location. The path is mapped per-OS in each job.
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"
  # Disable vcpkg metrics for faster, quieter runs.
  VCPKG_DISABLE_METRICS: "1"

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc-debug
            os: ubuntu-24.04
            compiler: gcc-14
            preset: debug
            cache_path: ~/.cache/vcpkg/archives
          - name: linux-gcc-release
            os: ubuntu-24.04
            compiler: gcc-14
            preset: release
            cache_path: ~/.cache/vcpkg/archives
          - name: linux-clang-debug
            os: ubuntu-24.04
            compiler: clang-20
            preset: debug
            cache_path: ~/.cache/vcpkg/archives
          - name: linux-gcc-telegram-release
            os: ubuntu-24.04
            compiler: gcc-14
            preset: release
            cache_path: ~/.cache/vcpkg/archives
            telegram: true
            run_tests: false
          - name: windows-msvc-debug
            os: windows-2022
            compiler: msvc
            preset: msvc-debug
            cache_path: ${{ github.workspace }}\.vcpkg-bincache
          - name: macos-appleclang-debug
            os: macos-14
            compiler: apple-clang
            preset: debug
            cache_path: ~/.cache/vcpkg/archives

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.4

      - name: Install GCC 14 (Linux GCC jobs)
        if: matrix.compiler == 'gcc-14'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Install Clang 20 (Linux Clang jobs)
        if: matrix.compiler == 'clang-20'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20 llvm-20 libc++-20-dev libc++abi-20-dev
          # Use libc++ rather than libstdc++. On Ubuntu noble, clang cannot reliably
          # find libstdc++-14's C++23 headers (std::expected, <print>) even with
          # --gcc-install-dir, because the split-package layout puts headers on a
          # search path the install-dir probe does not adjust. libc++ ships C++23
          # directly.
          {
            printf '%s\n' "CC=clang-20"
            printf '%s\n' "CXX=clang++-20"
            printf '%s\n' "CXXFLAGS=-stdlib=libc++"
            printf '%s\n' "LDFLAGS=-stdlib=libc++ -lc++abi"
          } >> "$GITHUB_ENV"

      - name: Configure MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Set up vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg"     >> "$GITHUB_ENV"
          echo "$HOME/vcpkg"                >> "$GITHUB_PATH"

      - name: Set up vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Windows runners ship vcpkg preinstalled at C:\vcpkg.
          printf '%s\n' 'VCPKG_ROOT=C:\vcpkg' >> "$GITHUB_ENV"
          printf '%s\n' 'C:\vcpkg'            >> "$GITHUB_PATH"

      - name: Prepare vcpkg binary cache directory
        shell: bash
        run: mkdir -p "${{ github.workspace }}/.vcpkg-bincache"

      - name: Cache vcpkg binary archives
        id: vcpkg-cache
        uses: actions/cache@v5.0.5
        with:
          # We use the workspace-local files-provider directory (see VCPKG_BINARY_SOURCES above).
          # The OS-default location is kept as a secondary path so toolchain-installed binaries are also reused.
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ${{ matrix.cache_path }}
          # Discriminator `libcxx` (Linux clang only) keeps libstdc++- and libc++-built
          # archives in separate cache slots so an ABI-mismatched archive is never reused.
          # Discriminator `telegram` keeps the TDLib-enabled manifest separate from the
          # faster default stub builds.
          key: ${{ runner.os }}-${{ matrix.compiler }}${{ matrix.compiler == 'clang-20' && '-libcxx' || '' }}${{ matrix.telegram && '-telegram' || '' }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}${{ matrix.compiler == 'clang-20' && '-libcxx' || '' }}${{ matrix.telegram && '-telegram' || '' }}-vcpkg-
            ${{ runner.os }}-${{ matrix.compiler }}${{ matrix.compiler == 'clang-20' && '-libcxx' || '' }}-vcpkg-
            ${{ runner.os }}-${{ matrix.compiler }}-vcpkg-
            ${{ runner.os }}-vcpkg-

      - name: Report cache status
        shell: bash
        run: |
          echo "vcpkg cache hit: ${{ steps.vcpkg-cache.outputs.cache-hit }}"

      - name: Configure with CMake
        if: ${{ !matrix.telegram }}
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure with CMake (real TDLib)
        if: ${{ matrix.telegram }}
        shell: bash
        run: |
          cmake -S . -B build/${{ matrix.preset }} -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_FEATURES=telegram \
            -DCMLB_WITH_TELEGRAM=ON \
            -DCMLB_BUILD_TESTS=OFF

      - name: Build with Ninja
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Run unit and integration tests
        if: ${{ matrix.run_tests != false }}
        shell: bash
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ctest-log-${{ matrix.name }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: lint (clang-format + cmake-format)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Install clang-format 20 and cmake-format
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-20 python3-pip
          python3 -m pip install --user cmake-format

      - name: Run clang-format (dry-run, treat warnings as errors)
        shell: bash
        run: |
          mapfile -d '' files < <(find include src tests benchmarks -type f \( -name '*.hpp' -o -name '*.cpp' \) -print0 2>/dev/null)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ sources found to format-check."
            exit 0
          fi
          clang-format-20 --version
          clang-format-20 --dry-run --Werror "${files[@]}"

      - name: Run cmake-format check
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mapfile -d '' files < <(find . -type f \( -name 'CMakeLists.txt' -o -name '*.cmake' \) \
            ! -path './build/*' ! -path './*/build/*' ! -path './third_party/*' ! -path './tdlib/*' -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No CMake files found to check."
            exit 0
          fi
          cmake-format --version
          cmake-format --check "${files[@]}"

  summary:
    name: CI summary (required check)
    runs-on: ubuntu-24.04
    needs: [build-and-test, lint]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Fail if any required job failed
        shell: bash
        run: |
          echo "build-and-test result: ${{ needs.build-and-test.result }}"
          echo "lint result:           ${{ needs.lint.result }}"
          if [ "${{ needs.build-and-test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs succeeded."
