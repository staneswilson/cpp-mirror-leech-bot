# docker.yml — build, test, and publish the CMLB container image.
#
# Triggers:
#   * Push to main      — builds and pushes :main + :sha-XXXXXXX (latest builder cache).
#   * Tag v*.*.*        — builds and pushes :vX.Y.Z + :X + :X.Y + :latest.
#   * Pull request      — builds without pushing (verification only).
#   * workflow_dispatch — manual trigger for ad-hoc rebuilds.
#
# Multi-arch: linux/amd64 + linux/arm64.

name: docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write    # for OIDC signing with cosign
  attestations: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & test (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full history so we can set OCI revision label

      - name: Set up QEMU (for arm64 emulation on amd64 runners)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=cmlb
            org.opencontainers.image.description=Production-grade C++23 Telegram mirror/leech bot
            org.opencontainers.image.licenses=MIT

      - name: Build image (and push on non-PR)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CMLB_RUN_TESTS=1
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max
          provenance: mode=max
          sbom: true

      - name: Smoke-test the built image (--version + --help)
        if: github.event_name == 'pull_request' && matrix.platform == 'linux/amd64'
        run: |
          IMAGE_ID=$(docker image ls --format '{{.Repository}}:{{.Tag}}' | head -1)
          echo "Testing image: $IMAGE_ID"
          docker run --rm "$IMAGE_ID" --version
          docker run --rm "$IMAGE_ID" --help | head -20

  scan:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0      # report but don't fail; promote with attestations
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
