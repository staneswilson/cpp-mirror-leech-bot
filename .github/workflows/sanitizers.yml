# Sanitizers: AddressSanitizer, UndefinedBehaviorSanitizer, and ThreadSanitizer runs on Linux/Clang.
name: Sanitizers

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly at 03:00 UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: sanitizers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"
  VCPKG_DISABLE_METRICS: "1"
  # NOTE: Suppression files live under tests/sanitizer_suppressions/ and will be added on demand
  # as we discover unavoidable third-party noise (tdlib, openssl, etc.).
  ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_leaks=1:strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1"
  UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1:print_summary=1:report_error_type=1"
  TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1:history_size=7"
  LSAN_OPTIONS: "use_unaligned=1"

jobs:
  sanitizer:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, ubsan, tsan]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.4

      - name: Install Clang 20
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20 llvm-20 libc++-20-dev libc++abi-20-dev
          # Use libc++ rather than libstdc++. On Ubuntu noble, clang cannot reliably
          # find libstdc++-14's C++23 headers (std::expected, <print>) even with
          # --gcc-install-dir, because the split-package layout puts headers on a
          # search path the install-dir probe does not adjust. libc++ ships C++23
          # directly.
          {
            printf '%s\n' "CC=clang-20"
            printf '%s\n' "CXX=clang++-20"
            printf '%s\n' "CXXFLAGS=-stdlib=libc++"
            printf '%s\n' "LDFLAGS=-stdlib=libc++ -lc++abi"
          } >> "$GITHUB_ENV"

      - name: Set up vcpkg
        shell: bash
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "$HOME/vcpkg"            >> "$GITHUB_PATH"

      - name: Prepare vcpkg binary cache directory
        shell: bash
        run: mkdir -p "${{ github.workspace }}/.vcpkg-bincache"

      - name: Cache vcpkg binary archives
        id: vcpkg-cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ~/.cache/vcpkg/archives
          # Discriminator `libcxx` keeps libstdc++- and libc++-built archives in
          # separate cache slots so an ABI-mismatched archive is never reused.
          key: ${{ runner.os }}-clang-20-libcxx-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-clang-20-libcxx-vcpkg-
            ${{ runner.os }}-clang-20-vcpkg-
            ${{ runner.os }}-vcpkg-

      - name: Report cache status
        shell: bash
        run: |
          echo "vcpkg cache hit: ${{ steps.vcpkg-cache.outputs.cache-hit }}"

      - name: Configure with CMake
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: Build with Ninja
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Run tests under ${{ matrix.preset }}
        shell: bash
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --timeout 300

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ctest-log-${{ matrix.preset }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
          retention-days: 14
