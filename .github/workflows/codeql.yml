# CodeQL: GitHub's semantic code scanning for C++ sources.
name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  actions: read
  contents: read

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"
  VCPKG_DISABLE_METRICS: "1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.4

      - name: Install GCC 14
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Set up vcpkg
        shell: bash
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "$HOME/vcpkg"            >> "$GITHUB_PATH"

      - name: Prepare vcpkg binary cache directory
        shell: bash
        run: mkdir -p "${{ github.workspace }}/.vcpkg-bincache"

      - name: Cache vcpkg binary archives
        id: vcpkg-cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-gcc-14-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-gcc-14-vcpkg-
            ${{ runner.os }}-vcpkg-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.2
        with:
          languages: ${{ matrix.language }}
          # Keep GitHub Security focused on actionable security findings.
          # The `security-and-quality` suite uploads hundreds of note-level
          # maintainability recommendations as code-scanning alerts, including
          # third-party headers extracted during the C++ build.
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - name: Configure with CMake
        shell: bash
        run: cmake --preset debug

      - name: Build with Ninja
        shell: bash
        run: cmake --build --preset debug --parallel

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
