# Static analysis: clang-tidy on changed C++ sources (PR) or full tree (main).
name: Static Analysis

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"
  VCPKG_DISABLE_METRICS: "1"

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
          # PRs need history to diff against origin/main.
          fetch-depth: 0

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.4

      - name: Install Clang 20 and clang-tidy
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 clang-tidy-20 clang-tools-20 lld-20 llvm-20 libc++-20-dev libc++abi-20-dev
          # Use libc++ rather than libstdc++. On Ubuntu noble, clang cannot reliably
          # find libstdc++-14's C++23 headers (std::expected, <print>) even with
          # --gcc-install-dir, because the split-package layout puts headers on a
          # search path the install-dir probe does not adjust. libc++ ships C++23
          # directly.
          {
            printf '%s\n' "CC=clang-20"
            printf '%s\n' "CXX=clang++-20"
            printf '%s\n' "CXXFLAGS=-stdlib=libc++"
            printf '%s\n' "LDFLAGS=-stdlib=libc++ -lc++abi"
          } >> "$GITHUB_ENV"

      - name: Set up vcpkg
        shell: bash
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "$HOME/vcpkg"            >> "$GITHUB_PATH"

      - name: Prepare vcpkg binary cache directory
        shell: bash
        run: mkdir -p "${{ github.workspace }}/.vcpkg-bincache"

      - name: Cache vcpkg binary archives
        id: vcpkg-cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ~/.cache/vcpkg/archives
          # Discriminator `libcxx` keeps libstdc++- and libc++-built archives in
          # separate cache slots so an ABI-mismatched archive is never reused.
          key: ${{ runner.os }}-clang-20-libcxx-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-clang-20-libcxx-vcpkg-
            ${{ runner.os }}-clang-20-vcpkg-
            ${{ runner.os }}-vcpkg-

      - name: Configure with CMake (debug, exports compile_commands.json)
        shell: bash
        run: cmake --preset debug

      - name: Check TDLib headers stay isolated
        shell: bash
        run: |
          mapfile -t violations < <(
            git grep -n -E '#[[:space:]]*include[[:space:]]*[<"]td/telegram/(td_api|Client)' -- \
              include src tests \
              ':!src/infrastructure/telegram/telegram_gateway.cpp' || true
          )
          if [ "${#violations[@]}" -ne 0 ]; then
            printf '%s\n' "TDLib headers must stay isolated in src/infrastructure/telegram/telegram_gateway.cpp:"
            printf '  %s\n' "${violations[@]}"
            exit 1
          fi

      - name: Determine changed C++ sources (pull_request only)
        id: changed
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
          mapfile -t files < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'src/**/*.cpp' 'tests/**/*.cpp' | tr '\n' ' ' | xargs -n1 | sort -u)
          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Changed C++ source files:"
          printf '  %s\n' "${files[@]}"

      - name: Run clang-tidy on changed sources (PR)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          files="${{ steps.changed.outputs.files }}"
          if [ -z "${files//[[:space:]]/}" ]; then
            echo "No changed C++ sources; skipping clang-tidy."
            exit 0
          fi
          run-clang-tidy-20 \
            -p build/debug \
            -header-filter='^.*include/cmlb/.*\.hpp$' \
            -warnings-as-errors='*' \
            -quiet \
            $files

      - name: Run clang-tidy on full tree (push/dispatch)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          mapfile -d '' files < <(find src tests -type f -name '*.cpp' -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ sources found."
            exit 0
          fi
          run-clang-tidy-20 \
            -p build/debug \
            -header-filter='^.*include/cmlb/.*\.hpp$' \
            -warnings-as-errors='*' \
            -quiet \
            "${files[@]}"
